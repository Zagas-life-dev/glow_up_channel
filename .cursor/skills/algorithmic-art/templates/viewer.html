<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  ALGORITHMIC ART VIEWER — BASE TEMPLATE                     ║
  ║                                                              ║
  ║  KEEP (do not modify):                                       ║
  ║    ✓ Layout structure (sidebar, canvas area)                 ║
  ║    ✓ Anthropic colors and fonts                              ║
  ║    ✓ Seed section and all seed functions                     ║
  ║    ✓ Actions section (reset, download)                       ║
  ║    ✓ data-driven resetParameters() pattern                   ║
  ║                                                              ║
  ║  REPLACE (make it yours):                                    ║
  ║    ✗ Title and subtitle                                      ║
  ║    ✗ The params object and defaultParams                     ║
  ║    ✗ The p5.js algorithm (setup, draw, classes)              ║
  ║    ✗ Parameter controls in the sidebar                       ║
  ║    ✗ Colors section (include only if art needs it)           ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generative Art Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Anthropic Brand Tokens ── */
    :root {
      --bg:         #faf9f5;
      --surface:    #ffffff;
      --dark:       #141413;
      --mid-gray:   #b0aea5;
      --light-gray: #e8e6dc;
      --orange:     #d97757;
      --blue:       #6a9bcc;
      --green:      #788c5d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #f5f3ee 100%);
      min-height: 100vh;
      color: var(--dark);
    }

    /* ── Layout ── */
    .container {
      display: flex;
      min-height: 100vh;
      padding: 20px;
      gap: 20px;
    }

    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(20,20,19,0.1);
      overflow-y: auto;
    }

    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    #canvas-container {
      width: 100%;
      max-width: 1000px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(20,20,19,0.1);
      background: var(--surface);
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
    }

    /* ── Sidebar Typography ── */
    .sidebar h1 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--mid-gray);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ── Control Sections ── */
    .control-section { margin-bottom: 28px; }

    .control-section h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid-gray);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .control-section h3::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
    }

    /* ── Seed Input ── */
    .seed-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--light-gray);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-align: center;
      color: var(--dark);
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .seed-input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 2px rgba(217,119,87,0.12);
      background: var(--surface);
    }

    .seed-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    /* ── Sliders ── */
    .control-group { margin-bottom: 18px; }

    .control-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 7px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      background: var(--light-gray);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      background: var(--orange);
      border-radius: 50%;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 15px; height: 15px;
      background: var(--orange);
      border-radius: 50%; border: none;
    }

    .value-display {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--mid-gray);
      min-width: 48px;
      text-align: right;
    }

    /* ── Color Pickers ── */
    .color-group { margin-bottom: 12px; }

    .color-group label {
      display: block;
      font-size: 12px;
      color: var(--mid-gray);
      margin-bottom: 4px;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="color"] {
      width: 30px; height: 30px;
      border: none; border-radius: 6px;
      cursor: pointer; background: none; padding: 0;
    }

    .color-hex {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--mid-gray);
    }

    /* ── Buttons ── */
    .btn {
      border: none;
      padding: 9px 14px;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn:active { transform: translateY(1px); }

    .btn-primary  { background: var(--orange); color: white; }
    .btn-primary:hover  { background: #c86641; }

    .btn-secondary { background: var(--blue); color: white; }
    .btn-secondary:hover { background: #5a8bb8; }

    .btn-tertiary  { background: var(--green); color: white; }
    .btn-tertiary:hover { background: #6b7b52; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar">

    <!-- REPLACE: title and subtitle -->
    <h1>Movement Name</h1>
    <div class="subtitle">A short evocative description of the generative aesthetic.</div>

    <!-- ── SEED (keep exactly as-is) ── -->
    <div class="control-section">
      <h3>Seed</h3>
      <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
      <div class="seed-controls">
        <button class="btn btn-secondary" onclick="previousSeed()">← Prev</button>
        <button class="btn btn-secondary" onclick="nextSeed()">Next →</button>
      </div>
      <button class="btn btn-tertiary" onclick="randomSeedAndUpdate()">↻ Random</button>
    </div>

    <!-- ── PARAMETERS (replace contents for your algorithm) ── -->
    <!--
      IMPORTANT: Add data-param="keyName" to every input so resetParameters() works automatically.
      The key must match the property name in the params object exactly.

      Example:
        params.noiseScale = 0.005
        <input type="range" data-param="noiseScale" id="noiseScale" ...>
    -->
    <div class="control-section">
      <h3>Parameters</h3>

      <!-- Example parameter 1 — replace with yours -->
      <div class="control-group">
        <label>Noise Scale</label>
        <div class="slider-row">
          <input type="range" data-param="noiseScale" id="noiseScale"
                 min="0.001" max="0.02" step="0.001" value="0.005"
                 oninput="updateParam('noiseScale', +this.value)">
          <span class="value-display" id="noiseScale-value">0.005</span>
        </div>
      </div>

      <!-- Example parameter 2 — replace with yours -->
      <div class="control-group">
        <label>Particle Count</label>
        <div class="slider-row">
          <input type="range" data-param="particleCount" id="particleCount"
                 min="500" max="8000" step="500" value="3000"
                 oninput="updateParam('particleCount', +this.value)">
          <span class="value-display" id="particleCount-value">3000</span>
        </div>
      </div>

    </div>

    <!-- ── COLORS (optional — remove this section if art uses fixed colors) ── -->
    <div class="control-section">
      <h3>Colors</h3>

      <div class="color-group">
        <label>Primary</label>
        <div class="color-row">
          <input type="color" id="color0" value="#d97757" onchange="updateColor(0, this.value)">
          <span class="color-hex" id="color0-hex">#d97757</span>
        </div>
      </div>

      <div class="color-group">
        <label>Secondary</label>
        <div class="color-row">
          <input type="color" id="color1" value="#6a9bcc" onchange="updateColor(1, this.value)">
          <span class="color-hex" id="color1-hex">#6a9bcc</span>
        </div>
      </div>

    </div>

    <!-- ── ACTIONS (keep exactly as-is) ── -->
    <div class="control-section">
      <h3>Actions</h3>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="resetParameters()">Reset</button>
        <button class="btn btn-secondary" onclick="downloadPNG()">Save PNG</button>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- ═══ CANVAS ═══ -->
  <div class="canvas-area">
    <div id="canvas-container"></div>
  </div>

</div><!-- /container -->

<script>
// ═══════════════════════════════════════════════════════════════
// PARAMS — replace properties with what YOUR algorithm needs
// Every key here must have a matching data-param input in HTML
// ═══════════════════════════════════════════════════════════════

let params = {
  seed:          12345,
  noiseScale:    0.005,
  particleCount: 3000,
  palette:       ['#d97757', '#6a9bcc']
};

// Deep-clone defaults once — used by resetParameters()
const defaultParams = JSON.parse(JSON.stringify(params));


// ═══════════════════════════════════════════════════════════════
// YOUR ALGORITHM — replace everything inside setup/draw/classes
// ═══════════════════════════════════════════════════════════════

let particles = [];

function setup() {
  const canvas = createCanvas(1200, 1200);
  canvas.parent('canvas-container');
  initializeSystem();
}

function initializeSystem() {
  randomSeed(params.seed);
  noiseSeed(params.seed);
  background(250, 249, 245);

  particles = [];
  for (let i = 0; i < params.particleCount; i++) {
    particles.push(new Particle());
  }

  // For static art: call noLoop() here after generating
  // For animated art: leave draw() running
}

function draw() {
  // ── Your algorithm goes here ──
  // Use params.noiseScale, params.palette, etc.
  // Example stub: move and render each particle
  for (const p of particles) {
    p.update();
    p.render();
  }
}

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = 0;
    this.vy = 0;
    this.col = random(params.palette);
  }

  update() {
    const angle = noise(this.x * params.noiseScale, this.y * params.noiseScale) * TWO_PI * 2;
    this.vx = cos(angle);
    this.vy = sin(angle);
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
      this.x = random(width);
      this.y = random(height);
    }
  }

  render() {
    stroke(this.col + '33'); // 20% opacity
    strokeWeight(1);
    point(this.x, this.y);
  }
}


// ═══════════════════════════════════════════════════════════════
// PARAM UPDATE HANDLERS
// ═══════════════════════════════════════════════════════════════

function updateParam(key, value) {
  params[key] = value;
  const display = document.getElementById(key + '-value');
  if (display) display.textContent = value;
  initializeSystem(); // or just set flag to redraw if animated
}

function updateColor(index, hex) {
  params.palette[index] = hex;
  const hexEl = document.getElementById('color' + index + '-hex');
  if (hexEl) hexEl.textContent = hex;
  initializeSystem();
}


// ═══════════════════════════════════════════════════════════════
// SEED CONTROLS — keep as-is
// ═══════════════════════════════════════════════════════════════

function updateSeedDisplay() {
  document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
  const v = parseInt(document.getElementById('seed-input').value);
  if (v > 0) { params.seed = v; initializeSystem(); }
  else { updateSeedDisplay(); }
}

function previousSeed() {
  params.seed = Math.max(1, params.seed - 1);
  updateSeedDisplay();
  initializeSystem();
}

function nextSeed() {
  params.seed += 1;
  updateSeedDisplay();
  initializeSystem();
}

function randomSeedAndUpdate() {
  params.seed = Math.floor(Math.random() * 999999) + 1;
  updateSeedDisplay();
  initializeSystem();
}


// ═══════════════════════════════════════════════════════════════
// RESET — data-driven: reads data-param attributes, no hardcoding
// ═══════════════════════════════════════════════════════════════

function resetParameters() {
  Object.assign(params, JSON.parse(JSON.stringify(defaultParams)));

  // Sync all sliders / number inputs tagged with data-param
  document.querySelectorAll('[data-param]').forEach(el => {
    const key = el.dataset.param;
    if (params[key] !== undefined) {
      el.value = params[key];
      const display = document.getElementById(key + '-value');
      if (display) display.textContent = params[key];
    }
  });

  // Sync color pickers
  if (params.palette) {
    params.palette.forEach((hex, i) => {
      const picker = document.getElementById('color' + i);
      const hexEl  = document.getElementById('color' + i + '-hex');
      if (picker) picker.value = hex;
      if (hexEl)  hexEl.textContent = hex;
    });
  }

  updateSeedDisplay();
  initializeSystem();
}


// ═══════════════════════════════════════════════════════════════
// DOWNLOAD — keep as-is
// ═══════════════════════════════════════════════════════════════

function downloadPNG() {
  const link = document.createElement('a');
  link.download = `generative-seed-${params.seed}.png`;
  link.href = document.querySelector('canvas').toDataURL('image/png');
  link.click();
}


// Init seed display on load
window.addEventListener('load', updateSeedDisplay);
</script>
</body>
</html>
